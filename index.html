<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SILHOUETTE PATTERN MAKER</title>
<style>
:root{
  --bg:#f3f0e8;--ink:#101010;--panel:#fff;--line:#171717;
  --accent:#ef3f35;--muted:#777;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);
font-family:Arial,"Helvetica Neue","Noto Sans JP",sans-serif}
button,input,select{font:inherit}
button{border:1.5px solid var(--line);background:transparent;color:var(--ink);
padding:9px 15px;min-height:42px;cursor:pointer;font-weight:700}
button:hover{background:#111;color:#fff}
button.active{background:#111;color:#fff}
button.danger{color:#b21f1f;border-color:#b21f1f}
.app{min-height:100dvh;display:grid;grid-template-columns:minmax(0,1fr) 350px}
.main{min-width:0;padding:24px;display:flex;flex-direction:column}
.header{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:end;
border-bottom:2px solid var(--line);padding-bottom:11px;margin-bottom:16px}
.title{font-size:clamp(22px,3vw,42px);font-weight:900;letter-spacing:-.05em;line-height:.9}
.meta{text-align:right;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.number{font-size:22px;font-weight:800}
.datetime{font-size:12px;margin-top:5px}
.stage{flex:1;min-height:0;display:grid;place-items:center}
.canvas-shell{width:min(76vw,calc(100dvh - 190px),900px);aspect-ratio:1;
background:#fff;border:2px solid var(--line);position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
.empty-message{position:absolute;inset:0;display:none;place-items:center;text-align:center;
padding:40px;background:rgba(255,255,255,.92);font-size:14px;line-height:1.8}
.empty-message.show{display:grid}
.controls{display:flex;flex-wrap:wrap;gap:8px;border-top:2px solid var(--line);
padding-top:12px;margin-top:16px}
.controls button{flex:0 0 auto}
.guide{margin-left:auto;align-self:center;font-size:12px;color:var(--muted)}
.panel{background:var(--panel);border-left:2px solid var(--line);padding:18px;
max-height:100dvh;overflow:auto}
.panel h2{font-size:16px;margin:0 0 8px}
.panel p{font-size:11px;line-height:1.6;color:var(--muted);margin:0 0 14px}
.section{border-top:1px solid #bbb;padding-top:14px;margin-top:14px}
.section h3{font-size:12px;margin:0 0 9px;text-transform:uppercase}
.file{display:block;border:1.5px solid var(--line);padding:10px;text-align:center;
cursor:pointer;font-size:12px;font-weight:700}
.file input{display:none}
.count{font-size:10px;color:var(--muted);margin:7px 0}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.item{border:1px solid #aaa;background:#f7f7f7;position:relative}
.item.off{opacity:.35}
.thumb{display:block;width:100%;aspect-ratio:1;object-fit:cover;background:white}
.name{font-size:8px;padding:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.actions{display:flex;gap:2px;padding:0 3px 3px}
.actions button{min-height:25px;padding:2px 3px;font-size:8px;flex:1;border-width:1px}
.empty{grid-column:1/-1;border:1px dashed #aaa;padding:10px;text-align:center;
font-size:10px;color:var(--muted)}
.control{margin:9px 0}
.control label{display:flex;justify-content:space-between;font-size:10px;color:#555;margin-bottom:4px}
input[type=range]{width:100%}
input[type=color],select{width:100%;height:34px;border:1px solid #777;background:white}
.check{display:flex;gap:6px;align-items:center;font-size:10px;margin:8px 0;color:#555}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.mobile-settings{display:none;position:fixed;right:10px;top:10px;z-index:30;background:#fff}
.flash{animation:flash .18s linear}
@keyframes flash{50%{filter:brightness(1.18)}}
@media(max-width:820px){
  .app{display:block}
  .main{min-height:100dvh;padding:14px}
  .header{padding-right:58px}
  .canvas-shell{width:min(94vw,calc(100dvh - 215px))}
  .panel{position:fixed;inset:0 0 0 auto;width:min(90vw,360px);z-index:20;
  transform:translateX(102%);transition:.25s;box-shadow:-18px 0 50px rgba(0,0,0,.3)}
  .panel.open{transform:none}
  .mobile-settings{display:block}
  .guide{width:100%;margin-left:0}
}
</style>
</head>
<body>
<button class="mobile-settings" id="settingsBtn">設定</button>
<div class="app">
<main class="main">
  <header class="header">
    <div class="title">SILHOUETTE<br>PATTERN MAKER</div>
    <div class="meta">
      <div class="number" id="edition">#001</div>
      <div class="datetime" id="datetime">----/--/-- --:--:--</div>
    </div>
  </header>

  <div class="stage">
    <div class="canvas-shell" id="canvasShell">
      <canvas id="canvas" width="1280" height="1280"></canvas>
      <div class="empty-message" id="emptyMessage">
        <div>シルエット画像とパターン画像を登録してください。<br>右上の「設定」から追加できます。</div>
      </div>
    </div>
  </div>

  <footer class="controls">
    <button id="startBtn">▶ スタート</button>
    <button id="stopBtn">■ ストップ</button>
    <button id="singleBtn">↻ 1回シャッフル</button>
    <button id="saveBtn">↓ PNG保存</button>
    <div class="guide" id="guide">スタートを押して組み合わせを作ろう</div>
  </footer>
</main>

<aside class="panel" id="panel">
  <h2>素材設定</h2>
  <p>以前の登録版と同じIndexedDBを使用するため、同一ドメイン・同一ブラウザで保存した画像は自動的に引き継がれます。</p>

  <section class="section">
    <h3>Silhouettes</h3>
    <label class="file">シルエットを追加<input id="silInput" type="file" accept="image/*" multiple></label>
    <div class="count" id="silCount"></div>
    <div class="gallery" id="silGallery"></div>
  </section>

  <section class="section">
    <h3>Patterns</h3>
    <label class="file">パターンを追加<input id="patInput" type="file" accept="image/*" multiple></label>
    <div class="count" id="patCount"></div>
    <div class="gallery" id="patGallery"></div>
  </section>

  <section class="section">
    <h3>Shuffle</h3>
    <div class="control"><label><span>変化速度</span><span id="speedOut">120ms</span></label>
      <input id="speed" type="range" min="60" max="1500" step="20" value="120"></div>
    <label class="check"><input id="noRepeat" type="checkbox" checked> 直前と同じ組み合わせを避ける</label>
    <label class="check"><input id="randomTransform" type="checkbox" checked> 位置・回転・拡大率をランダム化</label>
  </section>

  <section class="section">
    <h3>Composition</h3>
    <div class="control"><label><span>マスク判定</span><span id="thresholdOut">160</span></label>
      <input id="threshold" type="range" min="0" max="255" value="160"></div>
    <label class="check"><input id="invert" type="checkbox"> 明るい部分をシルエットにする</label>
    <div class="control"><label><span>パターン拡大率</span><span id="scaleOut">100%</span></label>
      <input id="scale" type="range" min="40" max="280" value="100"></div>
    <div class="control"><label><span>パターン回転</span><span id="rotationOut">0°</span></label>
      <input id="rotation" type="range" min="-180" max="180" value="0"></div>
    <div class="grid2">
      <div><div class="count">背景色</div><input id="bg" type="color" value="#f4f1e8"></div>
      <div><div class="count">シルエット配置</div>
        <select id="fit"><option value="contain">全体表示</option><option value="cover">画面いっぱい</option></select>
      </div>
    </div>
  </section>

  <section class="section">
    <button id="clearBtn" class="danger" style="width:100%">全登録画像を削除</button>
  </section>
</aside>
</div>

const $=id=>document.getElementById(id);
const canvas=$('canvas'),ctx=canvas.getContext('2d',{willReadFrequently:true});
const W=canvas.width,H=canvas.height;
const mask=document.createElement('canvas'),mctx=mask.getContext('2d',{willReadFrequently:true});
const layer=document.createElement('canvas'),lctx=layer.getContext('2d');
mask.width=layer.width=W;mask.height=layer.height=H;

const DB='silhouette-pattern-shuffle',STORE='images';
let db;
const state={
  sil:[],pat:[],si:-1,pi:-1,tx:0,ty:0,scale:1,rot:0,
  timer:null,edition:1,hasStopped:false
};

function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(DB,1);
  r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'})};
  r.onsuccess=()=>{db=r.result;res()};r.onerror=()=>rej(r.error)
})}
function dbPut(v){return new Promise((res,rej)=>{
  const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).put(v);
  t.oncomplete=res;t.onerror=()=>rej(t.error)
})}
function dbDelete(id){return new Promise((res,rej)=>{
  const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).delete(id);
  t.oncomplete=res;t.onerror=()=>rej(t.error)
})}
function dbAll(){return new Promise((res,rej)=>{
  const r=db.transaction(STORE).objectStore(STORE).getAll();
  r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)
})}
function dbClear(){return new Promise((res,rej)=>{
  const t=db.transaction(STORE,'readwrite');t.objectStore(STORE).clear();
  t.oncomplete=res;t.onerror=()=>rej(t.error)
})}
function imageFromData(src){return new Promise((res,rej)=>{
  const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src
})}
function fileData(file){return new Promise((res,rej)=>{
  const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file)
})}
function uuid(){return crypto.randomUUID?crypto.randomUUID():'id-'+Date.now()+'-'+Math.random().toString(36).slice(2)}

async function installEmbeddedPattern(){
  const already=state.pat.some(v=>v.id==='embedded-pattern-001');
  if(already)return;
  const item={
    id:'embedded-pattern-001',type:'pat',name:'uploaded-pattern.jpg',
    data:EMBEDDED_PATTERN,enabled:true,created:Date.now()
  };
  item.img=await imageFromData(item.data);
  state.pat.push(item);
  await dbPut({...item,img:undefined});
}

async function init(){
  await openDB();
  const all=await dbAll();
  for(const v of all){
    try{v.img=await imageFromData(v.data);state[v.type]?.push(v)}catch(e){}
  }
  await installEmbeddedPattern();
  renderGalleries();
  updateMeta(false);
  shuffle(false);
}

async function addFiles(files,type){
  for(const file of files){
    if(!file.type.startsWith('image/'))continue;
    const data=await fileData(file);
    const item={id:uuid(),type,name:file.name,data,enabled:true,created:Date.now()};
    item.img=await imageFromData(data);
    state[type].push(item);
    await dbPut({...item,img:undefined});
  }
  renderGalleries();shuffle(false);
}

function enabled(type){return state[type].map((v,i)=>({v,i})).filter(x=>x.v.enabled)}

function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

function renderGalleries(){
  for(const type of ['sil','pat']){
    const box=$(type+'Gallery'),arr=state[type];box.innerHTML='';
    $(type+'Count').textContent=`登録 ${arr.length}枚 / 使用中 ${enabled(type).length}枚`;
    if(!arr.length){box.innerHTML='<div class="empty">まだ登録されていません</div>';continue}
    arr.forEach((item,index)=>{
      const d=document.createElement('div');d.className='item'+(item.enabled?'':' off');
      d.innerHTML=`<img class="thumb" src="${item.data}" alt="">
      <div class="name" title="${esc(item.name)}">${esc(item.name)}</div>
      <div class="actions"><button data-act="toggle">${item.enabled?'使用中':'停止中'}</button><button data-act="delete">削除</button></div>`;
      d.querySelector('[data-act=toggle]').onclick=async()=>{
        item.enabled=!item.enabled;await dbPut({...item,img:undefined});
        renderGalleries();shuffle(false)
      };
      d.querySelector('[data-act=delete]').onclick=async()=>{
        await dbDelete(item.id);arr.splice(index,1);
        state.si=state.pi=-1;renderGalleries();shuffle(false)
      };
      box.appendChild(d);
    })
  }
}

function fitted(c,img,mode){
  const ir=img.width/img.height,cr=W/H;let dw,dh;
  if((mode==='contain'&&ir>cr)||(mode==='cover'&&ir<cr)){dw=W;dh=W/ir}
  else{dh=H;dw=H*ir}
  c.drawImage(img,(W-dw)/2,(H-dh)/2,dw,dh)
}

function buildMask(){
  mctx.clearRect(0,0,W,H);
  mctx.fillStyle='#fff';mctx.fillRect(0,0,W,H);
  fitted(mctx,state.sil[state.si].img,$('fit').value);
  const im=mctx.getImageData(0,0,W,H),d=im.data,t=+$('threshold').value,inv=$('invert').checked;
  for(let i=0;i<d.length;i+=4){
    const lum=.2126*d[i]+.7152*d[i+1]+.0722*d[i+2];
    d[i]=d[i+1]=d[i+2]=255;
    d[i+3]=(inv?lum>t:lum<t)?255:0;
  }
  mctx.putImageData(im,0,0)
}

function render(){
  ctx.fillStyle=$('bg').value;ctx.fillRect(0,0,W,H);
  const ok=state.si>=0&&state.pi>=0&&state.sil[state.si]?.enabled&&state.pat[state.pi]?.enabled;
  $('emptyMessage').classList.toggle('show',!ok);
  if(!ok)return;
  buildMask();
  lctx.clearRect(0,0,W,H);
  lctx.save();
  lctx.translate(W/2+state.tx,H/2+state.ty);
  lctx.rotate(state.rot);
  const img=state.pat[state.pi].img;
  const cover=Math.max(W/img.width,H/img.height)*state.scale;
  const dw=img.width*cover,dh=img.height*cover;
  lctx.drawImage(img,-dw/2,-dh/2,dw,dh);
  lctx.restore();
  lctx.globalCompositeOperation='destination-in';
  lctx.drawImage(mask,0,0);
  lctx.globalCompositeOperation='source-over';
  ctx.drawImage(layer,0,0);
}

function shuffle(animate=true){
  const s=enabled('sil'),p=enabled('pat');
  if(!s.length||!p.length){state.si=state.pi=-1;render();return}
  let ns=s[Math.floor(Math.random()*s.length)].i;
  let np=p[Math.floor(Math.random()*p.length)].i;
  if($('noRepeat').checked){
    if(s.length>1&&ns===state.si)ns=s.find(x=>x.i!==state.si)?.i??ns;
    if(p.length>1&&np===state.pi)np=p.find(x=>x.i!==state.pi)?.i??np;
  }
  state.si=ns;state.pi=np;
  if($('randomTransform').checked){
    state.tx=(Math.random()-.5)*W*.26;
    state.ty=(Math.random()-.5)*H*.26;
    state.scale=.72+Math.random()*1.35;
    state.rot=(Math.random()-.5)*Math.PI*2;
    $('scale').value=Math.round(state.scale*100);
    $('rotation').value=Math.round(state.rot*180/Math.PI);
  }else{
    state.tx=state.ty=0;
    state.scale=+$('scale').value/100;
    state.rot=+$('rotation').value*Math.PI/180;
  }
  sync();render();
  if(animate){
    const shell=$('canvasShell');shell.classList.remove('flash');void shell.offsetWidth;shell.classList.add('flash')
  }
}

function updateMeta(increment){
  if(increment&&state.hasStopped)state.edition++;
  state.hasStopped=true;
  $('edition').textContent='#'+String(state.edition).padStart(3,'0');
  const d=new Date(),z=n=>String(n).padStart(2,'0');
  $('datetime').textContent=`${d.getFullYear()}/${z(d.getMonth()+1)}/${z(d.getDate())} ${z(d.getHours())}:${z(d.getMinutes())}:${z(d.getSeconds())}`;
}

function start(){
  if(state.timer)return;
  if(!enabled('sil').length||!enabled('pat').length){$('guide').textContent='シルエットとパターンを登録してください';return}
  $('startBtn').classList.add('active');$('stopBtn').classList.remove('active');
  $('guide').textContent='組み合わせを生成中… ストップで固定';
  shuffle(false);
  state.timer=setInterval(()=>shuffle(false),+$('speed').value);
}

function stop(){
  if(state.timer){clearInterval(state.timer);state.timer=null}
  $('startBtn').classList.remove('active');$('stopBtn').classList.add('active');
  updateMeta(true);
  $('guide').textContent='この組み合わせを保存できます';
}

function sync(){
  $('thresholdOut').textContent=$('threshold').value;
  $('scaleOut').textContent=$('scale').value+'%';
  $('rotationOut').textContent=$('rotation').value+'°';
  $('speedOut').textContent=$('speed').value+'ms';
}

$('startBtn').onclick=start;
$('stopBtn').onclick=stop;
$('singleBtn').onclick=()=>{if(state.timer)stop();shuffle();updateMeta(true);$('guide').textContent='1つの組み合わせを生成しました'};
$('saveBtn').onclick=()=>{
  if(state.si<0||state.pi<0)return;
  const a=document.createElement('a');
  a.download=`silhouette-pattern-${String(state.edition).padStart(3,'0')}.png`;
  a.href=canvas.toDataURL('image/png');a.click()
};
$('speed').oninput=()=>{
  sync();
  if(state.timer){clearInterval(state.timer);state.timer=setInterval(()=>shuffle(false),+$('speed').value)}
};
$('silInput').onchange=e=>addFiles(e.target.files,'sil');
$('patInput').onchange=e=>addFiles(e.target.files,'pat');
['threshold','invert','bg','fit'].forEach(id=>$(id).addEventListener('input',()=>{sync();render()}));
$('scale').oninput=()=>{state.scale=+$('scale').value/100;sync();render()};
$('rotation').oninput=()=>{state.rot=+$('rotation').value*Math.PI/180;sync();render()};
$('clearBtn').onclick=async()=>{
  if(!confirm('登録画像をすべて削除しますか？'))return;
  if(state.timer)stop();
  await dbClear();state.sil=[];state.pat=[];state.si=state.pi=-1;
  renderGalleries();render()
};
$('settingsBtn').onclick=()=>$('panel').classList.toggle('open');
sync();init();
})();
</script>
</body>
</html>
